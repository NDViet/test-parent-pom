name: Publish Maven Package to GitHub Packages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-maven-github-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 and Maven settings
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Resolve deploy revision
        shell: bash
        run: |
          base_revision="$(sed -n 's|.*<revision>\([^<]*\)</revision>.*|\1|p' pom.xml | head -n 1)"
          if [ -z "${base_revision}" ]; then
            echo "Could not resolve <revision> from pom.xml"
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Tag pushes are release publishes: never keep SNAPSHOT suffix.
            deploy_revision="${base_revision%-SNAPSHOT}"
          else
            # Master pushes are snapshot publishes.
            if [[ "${base_revision}" == *-SNAPSHOT ]]; then
              deploy_revision="${base_revision}"
            else
              deploy_revision="${base_revision}-SNAPSHOT"
            fi
          fi

          echo "DEPLOY_REVISION=${deploy_revision}" >> "${GITHUB_ENV}"
          echo "Deploy revision: ${deploy_revision}"

      - name: Verify flattened POM resolves ${revision}
        shell: bash
        run: |
          local_repo="${RUNNER_TEMP}/m2-verify"
          rm -rf "${local_repo}"
          mkdir -p "${local_repo}"

          mvn -B -ntp -DskipTests -Drevision="${DEPLOY_REVISION}" -Dmaven.repo.local="${local_repo}" clean install

          if grep -R --line-number '\${revision}' "${local_repo}/org/ndviet/test-parent-pom" --include='*.pom'; then
            echo "Found unresolved \${revision} in generated Maven descriptor."
            exit 1
          fi

      - name: Publish to GitHub Maven Registry
        run: >
          mvn -B -ntp -DskipTests -Drevision=${{ env.DEPLOY_REVISION }} clean deploy
          -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
